<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cortex — Brain Training</title>
  <meta name="theme-color" content="#0b0e1a">
  <!-- iOS home-screen app -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cortex">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header id="topbar"></header>
    <main id="main"></main>
  </div>

  <!-- Core (order matters: classic scripts, no build step) -->
  <script src="js/core.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/engine.js"></script>

  <!-- Games (each registers itself with the engine) -->
  <script src="js/tasks/reaction.js"></script>
  <script src="js/tasks/symbols.js"></script>
  <script src="js/tasks/gonogo.js"></script>
  <script src="js/tasks/search.js"></script>
  <script src="js/tasks/nback.js"></script>
  <script src="js/tasks/digitspan.js"></script>
  <script src="js/tasks/spatialspan.js"></script>
  <script src="js/tasks/rotation.js"></script>
  <script src="js/tasks/stroop.js"></script>
  <script src="js/tasks/switching.js"></script>
  <script src="js/tasks/matrix.js"></script>
  <script src="js/tasks/math.js"></script>

  <!-- App logic -->
  <script src="js/assessment.js"></script>
  <script src="js/training.js"></script>
  <script src="js/main.js"></script>

  <script>
    // Offline support — service workers need a secure context (https or localhost).
    // Over plain http on a LAN this quietly does nothing; the app still works online.
    if ('serviceWorker' in navigator &&
        (location.protocol === 'https:' || ['localhost', '127.0.0.1'].includes(location.hostname))) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
